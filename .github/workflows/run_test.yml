name: Run Unit Test via Pytest  
  
on:
  push: 
    branches: ["*"]
  pull_request:
    branches: ["*"]
    paths:
      - "commonx/**"
      - "tests/**"
      - "pyproject.toml"
  
permissions:
  contents: read
  id-token: write

  
jobs:  
  build:  
    runs-on: ubuntu-latest  
    env:
      COMMONX_LOG_PATH: ${{ github.workspace }}/commonx/client
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"  # Force JavaScript actions to use Node.js 24
    strategy:  
      matrix:  
        python-version: ["3.10"]  
    steps:  
      - uses: actions/checkout@v6 
      - name: Set up Python ${{ matrix.python-version }}  
        uses: actions/setup-python@v5
        with:  
          python-version: ${{ matrix.python-version }}  
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH  # Ensure poetry is on PATH
      - name: Prepare log folder
        run: |
          mkdir -p "${COMMONX_LOG_PATH}"
      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true  # Optional: keeps `.venv` inside project

      - name: Install Dependencies
        run: poetry install --no-interaction


      - name: Lint with Ruff  
        run: |  
          pip install ruff  
          ruff check .  
        continue-on-error: true  
        
      - name: Test with pytest  
        run: |  
          poetry run coverage run -m pytest  -v -s  
        env:
          LOG_PATH: ${{ env.COMMONX_LOG_PATH }}
      - name: Generate Coverage Report  
        run: |  
          poetry run coverage report -m
      - name: Generate Coverage XML
        run: |
          poetry run coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          use_oidc: true
